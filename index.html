<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso Cifrario Vigenère</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; padding: 50px; }
        .box { max-width: 400px; margin: auto; background: #222; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 80%; padding: 10px; margin: 15px 0; border: none; border-radius: 5px; font-size: 16px; text-transform: uppercase; text-align: center; }
        button { background: #00adb5; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #00757d; }
        .error { color: #ff2e63; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔓 Sistema di Decrittazione</h2>
    <p>Inserisci la parola chiave per sbloccare la tabella di Vigenère:</p>
    
    <input type="text" id="passwordInput" placeholder="PAROLA CHIAVE">
    <button onclick="verificaChiave()">SBLOCCA</button>
    
    <p id="errorMsg" class="error">❌ Chiave errata. Riprova.</p>
</div>

<script>
function verificaChiave() {
    // La tua parola chiave salvata correttamente
    const chiaveCorretta = "AMORE"; 
    
    // NOTA: Sostituisci questo link generico con il link esatto del tuo file su Dropbox!
    // Ricorda di mettere ?dl=1 alla fine del link Dropbox per il download diretto.
    const linkDropbox = "https://www.dropbox.com/scl/fi/g7dzx4pacftgz18w6cj7z/TABELLA-DECODIFICA.pdf?rlkey=vfd6n4ey62p6npn61leke2cda&dl=0";

    const input = document.getElementById("passwordInput").value.trim().toUpperCase();
    const errore = document.getElementById("errorMsg");

    if (input === chiaveCorretta) {
        errore.style.display = "none";
        window.location.href = linkDropbox;
    } else {
        errore.style.display = "block";
    }
}
</script>

</body>
</html>
